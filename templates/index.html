<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie Genre Classifier</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(-45deg,#0f172a,#1e1b4b,#312e81,#0f172a);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
    overflow:hidden;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.floating{
    position:absolute;
    font-size:35px;
    animation:float 10s linear infinite;
    opacity:0.6;
}

.f1{left:10%; animation-delay:0s;}
.f2{left:25%; animation-delay:2s;}
.f3{left:50%; animation-delay:4s;}
.f4{left:75%; animation-delay:6s;}
.f5{left:90%; animation-delay:8s;}

@keyframes float{
    0%{
        transform:translateY(100vh) rotate(0deg);
    }
    100%{
        transform:translateY(-100px) rotate(360deg);
    }
}

.container{
    width:750px;
    padding:35px;
    border-radius:25px;
    backdrop-filter:blur(18px);
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.4);
    text-align:center;
    color:white;
}

.title{
    font-size:40px;
    margin-bottom:10px;
    font-weight:bold;
    background:linear-gradient(90deg,#38bdf8,#22c55e,#f59e0b);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    color:#cbd5e1;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:220px;
    border:none;
    outline:none;
    border-radius:15px;
    padding:20px;
    font-size:16px;
    resize:none;
    background:rgba(255,255,255,0.12);
    color:white;
}

textarea::placeholder{
    color:#d1d5db;
}

button{
    width:100%;
    margin-top:20px;
    padding:15px;
    border:none;
    border-radius:15px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    color:white;
    background:linear-gradient(90deg,#06b6d4,#3b82f6);
    transition:.4s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 0 25px #38bdf8;
}

.result{
    margin-top:25px;
    padding:20px;
    border-radius:15px;
    background:rgba(34,197,94,0.2);
    border:1px solid #22c55e;
    animation:pop .8s ease;
}

@keyframes pop{
    from{
        transform:scale(0.7);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.genre{
    font-size:30px;
    color:#22c55e;
    font-weight:bold;
}

.footer{
    margin-top:25px;
    color:#cbd5e1;
    font-size:15px;
}

.name{
    color:#38bdf8;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="floating f1">🎬</div>
<div class="floating f2">🍿</div>
<div class="floating f3">🎥</div>
<div class="floating f4">✨</div>
<div class="floating f5">🎞️</div>

<div class="container">

<h1 class="title">🎬 Movie Genre Classifier</h1>

<p class="subtitle">
Predict movie genres using Machine Learning & TF-IDF 🚀
</p>

<form action="/predict" method="POST">

<textarea
name="plot"
placeholder="📝 Enter movie plot summary here..."
required></textarea>

<button type="submit">
🔮 Predict Genre
</button>

</form>

{% if prediction %}

<div class="result">
<h2>🎯 Predicted Genre</h2>
<div class="genre">{{ prediction }}</div>
</div>

{% endif %}

<div class="footer">
🤖 Machine Learning Project <br>
Developed by <span class="name">Akshat Goyal</span> 🚀
</div>

</div>

</body>
</html>
